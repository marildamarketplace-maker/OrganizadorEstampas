name: Gerar aplicativo Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gerar aplicativo
        run: pyinstaller --noconfirm --clean --windowed --name "OrganizadorEstampasMeury" app.py

      - name: Disponibilizar aplicativo
        uses: actions/upload-artifact@v4
        with:
          name: OrganizadorEstampas-Windows
          path: dist/OrganizadorEstampasMeury/
          if-no-files-found: error
